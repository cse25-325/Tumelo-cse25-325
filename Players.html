<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <link rel="stylesheet" href="style.css">


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>



</head>
<body class="bg-dark">

  <header class="bg-black text-light py-2">
    <section class="container">
      <section class="row align-items-center g-2">

        
        <figure class="col-12 col-md-3 m-0 text-center text-md-start">
          <a href="index.html">

        <section class="col-12 col-md-7">
          <form id="searchForm" class="d-flex" role="search" aria-label="Player search">
            <label for="searchInput" class="visually-hidden">Search players</label>

            </button>

        </section>

    
        <section class="col-12 col-md-2 text-center text-md-end">
          <button type="button" class="btn btn-outline-light rounded-circle"
                  data-bs-toggle="modal" data-bs-target="#helpModal" aria-label="Help">
            <span class="bi bi-question-lg" aria-hidden="true"></span>
          </button>
        </section>

      </section>
       <nav class="mt-3">
    <a href="index.html" class="text-light">Home</a> |
    <a href="About.html" class="text-light">About</a> |
    <a href="Teams.html" class="text-light">Teams</a> |
    <a href="Players.html" class="text-light">Players</a> |
    <a href="Matches.html" class="text-light">Matches</a> |

    <a href="Contact.html" class="text-light">Contact</a> |
    <a href="Feedback.html" class="text-light">Feedback</a>
  </nav>
    </section>
  </header>

  
  <main>
        <h1>Players</h1>

        <section id="top-stats">
            <article id="goal-scorers">
                <h2>ALL-TIME TOP GOAL SCORERS</h2>
                
                <div class="player-card">
                    <img src="photos/cristiano-ronaldo.jpg" alt="Portrait of Cristiano Ronaldo" width="100" height="120">
                    <h3>Cristiano Ronaldo</h3>
                    <p>Goals: 891</p>
                </div>

                <div class="player-card">
                    <img src="photos/Leonel.jpg" alt="Portrait of Lionel Messi" width="100" height="120">
                    <h3>Lionel Messi</h3>
                    <p>Goals: 819</p>
                </div>

                <div class="player-card">
                    <img src="photos/Pele-Brazilian-soccer-player-athlete-circa-1970s.jpg" alt="Portrait of Pelé" width="100" height="120">
                    <h3>Pelé</h3>
                    <p>Goals: 767</p>
                </div>
            </article>
        </section>
    </main>
<footer>
        <p>&copy; 2026FIFA Fan Hub. All rights reserved.</p>
        <p>Follow us: 
            <a href="https://facebook.com">Facebook
                <img src="photos/Facebook.png" alt="Facebook icon" width="20" height="20">
            </a> 
            <a href="https://instagram.com">Instagram
                <img src="photos/insta.jpg" alt="Instagram icon" width="20" height="20">
            </a>  
            <a href="https://twitter.com">Twitter
                <img src="photos/twitter.jpg" alt="Twitter icon" width="20" height="20">
            </a>
        </p>
    </footer>

    <script>

let expanded = false;

const extraPlayers = [
    {name:"Neymar", nation:"Brazil", stat:"Goals: 450"},
    {name:"Mbappe", nation:"France", stat:"Goals: 300"},
    {name:"Ronaldinho", nation:"Brazil", stat:"Assists: 200"},
    {name:"Zidane", nation:"France", stat:"Assists: 180"}
];

function loadMore() {
    let section = document.getElementById("playersArea");

    if (!expanded) {
        extraPlayers.forEach(p => {
            let player = document.createElement("article");
            player.className = "col-md-6";

            player.innerHTML =
                '<img src="https://via.placeholder.com/120" class="img-fluid" alt="Player image">' +
                '<p>Name: ' + p.name + '</p>' +
                '<p>Nationality: ' + p.nation + '</p>' +
                '<p>' + p.stat + '</p>' +
                '<button class="btn btn-success" onclick="viewPlayer(\'' + p.name + '\')">View player</button>';

            section.appendChild(player);
        });

        expanded = true;

        // Change button text
        document.querySelectorAll(".loadBtn").forEach(b => b.innerText = "Show less");

    } else {
        // Remove extra players
        let allPlayers = section.querySelectorAll("article");
        
        for (let i = allPlayers.length - 1; i >= 4; i--) {
            section.removeChild(allPlayers[i]);
        }

        expanded = false;

        document.querySelectorAll(".loadBtn").forEach(b => b.innerText = "View more players...");
    }
}

/* SEARCH + RELATED */
function searchFunction() {

    let input = document.getElementById("searchBox").value.toLowerCase();
    let players = document.querySelectorAll("#playersArea article");
    let suggestionBox = document.getElementById("suggestions");

    suggestionBox.innerHTML = ""; // clear

    players.forEach(p => {
        let text = p.innerText.toLowerCase();

        if (text.includes(input)) {
            p.style.display = "";

            // Add suggestion entry
            if (input.length > 0) {
                let item = document.createElement("p");
                item.innerText = p.innerText.split("\n")[0]; // player name
                item.className = "bg-light text-dark p-1";

                item.onclick = () => alert("Related search: " + item.innerText);

                suggestionBox.appendChild(item);
            }

        } else {
            p.style.display = "none";
        }
    });
}

/* SAME FUNCTIONS */
function viewPlayer(name) {
    alert("Viewing player: " + name);
}

function showGoals() {
    document.getElementById("p1stat").innerText = "Goals: 970";
    document.getElementById("p2stat").innerText = "Goals: 820";
    document.getElementById("p3stat").innerText = "Goals: 906";
    document.getElementById("p4stat").innerText = "Goals: 767";
}

function showAssists() {
    document.getElementById("p1stat").innerText = "Assists: 300";
    document.getElementById("p2stat").innerText = "Assists: 408";
    document.getElementById("p3stat").innerText = "Assists: 350";
    document.getElementById("p4stat").innerText = "Assists: 370";
}

</script>
</body>
</html>
