<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>About - FIFA Fan Hub</title>

<style>

    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;


header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#2c2c2c;
    color:white;
}

/* NAV BAR */
nav{
    background:#555;
}

nav ul{
    display:flex;
    justify-content:space-around;
    list-style:none;
}

nav ul li{
    padding:12px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

/* TITLE BAR */
.page-title{
    background:#d9d9d9;
    text-align:center;
    padding:15px;
    border-bottom:2px solid #aaa;
}


main{
    padding:20px;
}


.content{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}


.text-content{
    flex:3;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.text-content article{
    background:#e6e6e6;
    padding:20px;
    height:80px;
}


aside{
    flex:1;
    background:#cfcfcf;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* BOTTOM SECTION */
.additional-info{
    display:flex;
    gap:20px;


.additional-info article{
    flex:1;
    background:#e6e6e6;
    padding:30px;
    text-align:center;



    margin-top:20px;
    background:#2c2c2c;
    color:white;
    text-align:center;
    padding:15px;

</style>

</head>

<body>

<!-- HEADER -->
<header>
    <div>LOGO</div>
    <div>SEARCH</div>
</header>


<nav>
    <ul>
        <li><a href="#">HOME</a></li>
        <li><a href="#">ABOUT</a></li>
        <li><a href="#">TEAMS</a></li>
        <li><a href="#">PLAYERS</a></li>
        <li><a href="#">MATCHES</a></li>
        <li><a href="#">NEWS</a></li>
        <li><a href="#">CONTACT</a></li>
        <li><a href="#">FEEDBACK</a></li>
    </ul>
</nav>


<section class="page-title">
    <h1>ABOUT FIFA FAN HUB</h1>
</section>

<!-- MAIN -->
<main>

    
    <section class="content">

        <!-- LEFT -->
        <section class="text-content">
            <article>DESCRIPTION</article>
            <article>PURPOSE</article>
            <article>TARGET AUDIENCE</article>
        </section>

        
        <aside>
            IMAGE
        </aside>

    </section>

    
    <section class="additional-info">
        <article>OBJECTIVES</article>
        <article>MISSION</article>
    </section>

</main>


<footer>
    FOOTER
</footer>

</body>
</html>
